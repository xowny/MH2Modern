[MH2Modern]

; ------------------------------
; Stability And Compatibility
; ------------------------------

; Prevent the game from pinning itself to CPU 0 during startup.
EnableAffinityModernization=1

; Use modern Windows DPI behavior so fullscreen and desktop scaling behave properly.
EnableDpiAwareness=1

; Request a 1 ms system timer for tighter frame pacing.
EnableTimerResolution=1
TimerResolutionMs=1

; Ask Windows not to downclock the process when that control is available.
DisablePowerThrottling=1

; Write a crash dump if the game or another loaded module hard-crashes.
EnableCrashDumps=1


; ------------------------------
; Graphics
; ------------------------------

; Force fullscreen PresentInterval=ONE instead of letting the driver interpret DEFAULT.
EnableRenderPresentationPolicy=1
RenderForceFullscreenIntervalOne=1

; Clean up fragile Reset parameters during display recovery.
EnableRenderResetSanitation=1

; Reduce CPU waste if the game falls into an old D3D9 lost-device polling loop.
EnableRenderDeviceLostThrottle=1
RenderDeviceLostSleepMs=1


; ------------------------------
; Mouse And Input
; ------------------------------

; Use raw mouse deltas for the DirectInput mouse path.
EnableRawMouseInput=1

; Release and restore the fullscreen cursor clip correctly on focus changes.
EnableCursorClipModernization=1

; Stop the game from changing Windows mouse and accessibility settings.
EnableMouseSpiGuard=1


; ------------------------------
; Audio
; ------------------------------

; Enable the FMOD compatibility fixes and runtime cleanup paths.
EnableAudioModernization=1

; Suppress exact repeated FMOD setter spam from the proven noisy frontend/music callsites.
EnableAudioSetterElision=1

; Prefer stereo instead of broken mono fallback behavior on modern systems.
AudioPreferStereoFallback=1

; Inject a safer DSP buffer configuration when the game leaves it underspecified.
AudioFixMissingDspBuffer=1


; ------------------------------
; Frame Pacing
; ------------------------------

; Keep the game on the MH2Modern frame limiter and pacing path.
EnableFrameLimiterPatch=1
FrameLimitHz=60

; Use sleep + short spin pacing for steadier frametimes.
EnableHybridFramePacing=1

; Lower the frame cap when the game is unfocused.
EnableBackgroundFrameLimit=1
BackgroundFrameLimitHz=15


; ------------------------------
; Diagnostics
; Leave these off unless you are troubleshooting.
; ------------------------------

LogAffinityPatch=0
LogPlatformModernization=0
LogRenderHooks=0
LogInputHooks=0
LogAudioInitCalls=0
LogAudioRuntimeCalls=0
LogAudioSetterElision=0
EnableFramePacingStats=0
LogTimerCalls=0
LogVersionCalls=0
LogStartupDetails=0
StartupSlowIoThresholdMs=3
